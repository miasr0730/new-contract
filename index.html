<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規契約 顧客情報入力 (完全版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input:checked + label { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .form-section { background: white; padding: 1.5rem; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #f3f4f6; margin-bottom: 1.5rem; }
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; color: #1e40af; border-left: 5px solid #3b82f6; padding-left: 0.75rem; }
        .chip-label { display: block; text-align: center; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 0.75rem; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        input[type="tel"], input[type="text"], input[type="email"], textarea { width: 100%; padding: 0.8rem; background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.75rem; outline: none; }
        input:focus, textarea:focus { border-color: #3b82f6; ring: 2px; ring-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-28">

    <div class="max-w-md mx-auto p-4">
        <header class="py-6 text-center">
            <h1 class="text-2xl font-black text-blue-800">新規契約 顧客情報入力</h1>
            <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest font-bold">Smart Intake System</p>
        </header>

        <form action="https://docs.google.com/forms/d/e/1FAIpQLSe_X6VqC-80Z8z1O5jY5n7iV9Xz6v2jL_r9aZ1W_u2z9v_qQg/formResponse" method="POST">
            
            <div class="form-section">
                <h2 class="section-title">担当者</h2>
                <div class="grid grid-cols-2 gap-2">
                    <input type="radio" id="st1" name="entry.1132415170" value="香川" class="hidden" required><label for="st1" class="chip-label">香川</label>
                    <input type="radio" id="st2" name="entry.1132415170" value="久保" class="hidden"><label for="st2" class="chip-label">久保</label>
                    <input type="radio" id="st3" name="entry.1132415170" value="森本" class="hidden"><label for="st3" class="chip-label">森本</label>
                    <input type="radio" id="st4" name="entry.1132415170" value="惣津" class="hidden"><label for="st4" class="chip-label">惣津</label>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">ご契約者様情報</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">氏名</label>
                        <input type="text" name="entry.2005620554" placeholder="山田 太郎" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">フリガナ</label>
                        <input type="text" name="entry.1045781291" placeholder="ヤマダ タロウ">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">郵便番号（ハイフンなし）</label>
                        <input type="tel" name="entry.1594833256" inputmode="numeric" placeholder="1234567">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">住所</label>
                        <textarea name="entry.1569502758" rows="2" placeholder="東京都..."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">連絡先電話番号</label>
                        <input type="tel" name="entry.1166974658" inputmode="numeric" placeholder="09012345678" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">メールアドレス</label>
                        <input type="email" name="entry.1065046570" placeholder="example@mail.com">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">設置場所</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input type="radio" id="loc1" name="entry.xxx_loc" value="同上" class="hidden" checked onclick="toggleLoc(false)"><label for="loc1" class="chip-label">同上</label>
                    <input type="radio" id="loc2" name="entry.xxx_loc" value="別住所" class="hidden" onclick="toggleLoc(true)"><label for="loc2" class="chip-label">別住所</label>
                </div>
                <div id="other-location" class="hidden space-y-4 border-t pt-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">設置先郵便番号</label>
                        <input type="tel" name="entry.xxx_zip2" inputmode="numeric" placeholder="1234567">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">設置先住所</label>
                        <textarea name="entry.xxx_addr2" rows="2" placeholder="設置先の住所を入力"></textarea>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">ご契約内容（複数選択）</h2>
                <div class="grid grid-cols-2 gap-2">
                    <input type="checkbox" id="it1" name="entry.1030868284" value="太陽光" class="hidden"><label for="it1" class="chip-label">太陽光</label>
                    <input type="checkbox" id="it2" name="entry.1030868284" value="蓄電池" class="hidden"><label for="it2" class="chip-label">蓄電池</label>
                    <input type="checkbox" id="it3" name="entry.1030868284" value="V2H" class="hidden"><label for="it3" class="chip-label">V2H</label>
                    <input type="checkbox" id="it4" name="entry.1030868284" value="エコキュート" class="hidden"><label for="it4" class="chip-label">エコキュート</label>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">設備詳細・補助金</h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold mb-2">太陽光 補助金</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="radio" id="pv_s1" name="entry.xxx_pv_sub" value="あり" class="hidden"><label for="pv_s1" class="chip-label">あり</label>
                            <input type="radio" id="pv_s2" name="entry.xxx_pv_sub" value="なし" class="hidden"><label for="pv_s2" class="chip-label">なし</label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">蓄電池 補助金詳細</label>
                        <div class="flex flex-wrap gap-2">
                            <input type="radio" id="bt_d1" name="entry.xxx_bt_det" value="DR" class="hidden"><label for="bt_d1" class="px-4 py-2 border rounded-full text-sm">DR</label>
                            <input type="radio" id="bt_d2" name="entry.xxx_bt_det" value="自治体" class="hidden"><label for="bt_d2" class="px-4 py-2 border rounded-full text-sm">自治体</label>
                            <input type="radio" id="bt_d3" name="entry.xxx_bt_det" value="なし" class="hidden"><label for="bt_d3" class="px-4 py-2 border rounded-full text-sm">なし</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">保証年数</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">太陽光保証</label>
                        <div class="grid grid-cols-3 gap-2">
                            <input type="radio" id="w1" name="entry.xxx_w1" value="10年" class="hidden"><label for="w1" class="chip-label">10年</label>
                            <input type="radio" id="w2" name="entry.xxx_w1" value="15年" class="hidden"><label for="w2" class="chip-label">15年</label>
                            <input type="radio" id="w3" name="entry.xxx_w1" value="25年" class="hidden"><label for="w3" class="chip-label">25年</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">事務・確認事項</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">提出書類確認</label>
                        <div class="space-y-2">
                            <label class="flex items-center p-3 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                                <input type="checkbox" name="entry.xxx_doc" value="免許証" class="w-5 h-5 text-blue-600 mr-3">
                                <span class="text-sm">本人確認書類（免許証等）</span>
                            </label>
                            <label class="flex items-center p-3 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                                <input type="checkbox" name="entry.xxx_doc" value="検針票" class="w-5 h-5 text-blue-600 mr-3">
                                <span class="text-sm">電気の検針票</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">事務共有事項（フリー入力）</label>
                        <textarea name="entry.xxx_memo" rows="4" placeholder="特記事項があれば入力してください"></textarea>
                    </div>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-2xl z-50">
                <button type="submit" class="w-full max-w-md mx-auto block bg-blue-600 hover:bg-blue-700 text-white text-lg font-black py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all">
                    契約情報を送信する
                </button>
            </div>

        </form>
    </div>

    <script>
        function toggleLoc(show) {
            document.getElementById('other-location').classList.toggle('hidden', !show);
        }
    </script>
</body>
</html>
