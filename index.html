<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規契約 顧客情報入力フォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* タップしやすいカスタムラジオ・チェックボックス */
        input:checked + label {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans leading-relaxed">

    <div class="max-w-md mx-auto p-4 pb-20">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-blue-700">新規契約 顧客情報入力</h1>
            <p class="text-sm text-gray-500 mt-2">お客さまの情報を入力してください</p>
        </header>

        <form id="customerForm" class="space-y-6">
            
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold mb-4 border-l-4 border-blue-500 pl-3">基本情報</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">氏名</label>
                        <input type="text" name="name" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例：山田 太郎" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">フリガナ</label>
                        <input type="text" name="kana" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例：ヤマダ タロウ" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">電話番号（ハイフンなし）</label>
                        <input type="tel" name="tel" inputmode="numeric" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" placeholder="09012345678" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">メールアドレス</label>
                        <input type="email" name="email" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" placeholder="example@mail.com" required>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-lg font-semibold mb-4">担当者</label>
                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <input type="radio" id="staff1" name="staff" value="香川" class="hidden" required>
                        <label for="staff1" class="block text-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition shadow-sm">香川</label>
                    </div>
                    <div class="relative">
                        <input type="radio" id="staff2" name="staff" value="久保" class="hidden">
                        <label for="staff2" class="block text-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition shadow-sm">久保</label>
                    </div>
                    <div class="relative">
                        <input type="radio" id="staff3" name="staff" value="森本" class="hidden">
                        <label for="staff3" class="block text-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition shadow-sm">森本</label>
                    </div>
                    <div class="relative">
                        <input type="radio" id="staff4" name="staff" value="総津" class="hidden">
                        <label for="staff4" class="block text-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition shadow-sm">総津</label>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-lg font-semibold mb-4">ご契約内容（複数可）</label>
                <div class="flex flex-wrap gap-3">
                    <div class="relative">
                        <input type="checkbox" id="item1" name="items" value="太陽光" class="hidden">
                        <label for="item1" class="block px-5 py-2 border border-gray-200 rounded-full cursor-pointer hover:bg-gray-50 shadow-sm transition">太陽光</label>
                    </div>
                    <div class="relative">
                        <input type="checkbox" id="item2" name="items" value="蓄電池" class="hidden">
                        <label for="item2" class="block px-5 py-2 border border-gray-200 rounded-full cursor-pointer hover:bg-gray-50 shadow-sm transition">蓄電池</label>
                    </div>
                    <div class="relative">
                        <input type="checkbox" id="item3" name="items" value="V2H" class="hidden">
                        <label for="item3" class="block px-5 py-2 border border-gray-200 rounded-full cursor-pointer hover:bg-gray-50 shadow-sm transition">V2H</label>
                    </div>
                    <div class="relative">
                        <input type="checkbox" id="item4" name="items" value="エコキュート" class="hidden">
                        <label for="item4" class="block px-5 py-2 border border-gray-200 rounded-full cursor-pointer hover:bg-gray-50 shadow-sm transition">エコキュート</label>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold mb-4 border-l-4 border-blue-500 pl-3">住所・設置場所</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">郵便番号（ハイフンなし）</label>
                        <input type="tel" name="zip" inputmode="numeric" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" placeholder="1234567">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">住所</label>
                        <textarea name="address" rows="2" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" placeholder="東京都..."></textarea>
                    </div>
                </div>
            </section>

            <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-gray-200">
                <button type="submit" class="w-full max-w-md mx-auto block bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">
                    この内容で送信する
                </button>
            </div>

        </form>
    </div>

    <script>
        document.getElementById('customerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('入力を確認しました。実際の運用ではここをGoogleフォームの送信先にリンクさせます。');
        });
    </script>
</body>
</html>
